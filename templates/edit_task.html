{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

<div class="auth-card">

<h2>Edit Task</h2>

<form method="post">

{% csrf_token %}

<div class="form-group">
<label>Title</label>
{{ form.title }}
</div>

<div class="form-group">
<label>Description</label>
{{ form.description }}
</div>

<div class="form-group">
<label>Deadline</label>
{{ form.deadline }}
</div>

<button type="submit" class="primary-btn">
Update Task
</button>

</form>

</div>

</div>

{% endblock %}
