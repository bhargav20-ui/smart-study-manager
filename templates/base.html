{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>Smart Study Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold" href="/">SmartStudy</a>

<div class="ms-auto">

{% if user.is_authenticated %}

<a href="/dashboard/" class="btn btn-light me-2">Dashboard</a>

<a href="/profile/" class="btn btn-light me-2">Profile</a>

<form method="post" action="{% url 'logout' %}" style="display:inline;">
{% csrf_token %}
<button class="btn btn-danger">Logout</button>
</form>

{% else %}

<a href="/accounts/login/" class="btn btn-outline-dark me-2">Login</a>
<a href="/register/" class="btn btn-primary">Register</a>

{% endif %}

</div>

</div>

</nav>

<div class="container mt-5">

{% block content %}
{% endblock %}

</div>

</body>

</html>
