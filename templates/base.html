<!DOCTYPE html>
<html>
<head>
    <title>Smart Study Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">SmartStudy</a>

    <div class="ms-auto">
      {% if user.is_authenticated %}

        <div class="dropdown">
          <button class="btn btn-outline-light btn-sm dropdown-toggle"
                  type="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">
            {{ user.username }}
          </button>

          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="/dashboard/">Dashboard</a>
            </li>
            <li>
              <a class="dropdown-item" href="/profile/">Profile</a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" href="/accounts/logout/">
                Logout
              </a>
            </li>
          </ul>
        </div>

      {% else %}
        <a href="/accounts/login/" class="btn btn-outline-light btn-sm me-2">Login</a>
        <a href="/register/" class="btn btn-success btn-sm">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="text-center py-2 text-muted bg-light border-top fixed-bottom">
    © 2026 Smart Study Manager | Built with Django
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
