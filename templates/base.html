<!DOCTYPE html>
<html>
<head>
    <title>Smart Study Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">SmartStudy</a>

    <div class="ms-auto">
      {% if user.is_authenticated %}
        <a href="/dashboard/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a href="/accounts/logout/" class="btn btn-danger btn-sm">Logout</a>
      {% else %}
        <a href="/accounts/login/" class="btn btn-outline-light btn-sm me-2">Login</a>
        <a href="/register/" class="btn btn-success btn-sm">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="text-center mt-5 mb-3 text-muted">
    © 2026 Smart Study Manager | Built with Django
</footer>

</body>
</html>
