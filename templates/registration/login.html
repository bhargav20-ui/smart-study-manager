{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

<div class="auth-card">

<h2>Login</h2>

{% if form.errors %}
<p style="color:#f87171;text-align:center;">Invalid username or password</p>
{% endif %}

<form method="post">

{% csrf_token %}

{{ form.username }}
{{ form.password }}

<button class="auth-btn">Login</button>

</form>

<p class="auth-footer">
Don't have an account?
<a href="/register/">Register</a>
</p>

</div>
</div>

{% endblock %}
