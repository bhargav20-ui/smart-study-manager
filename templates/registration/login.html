{% extends "base.html" %}

{% block content %}

<div class="auth-box">

<h2>Login</h2>

{% if form.errors %}
<div class="alert alert-danger">
Invalid username or password
</div>
{% endif %}

<form method="post">

{% csrf_token %}

{{ form.username }}
{{ form.password }}

<button class="btn btn-primary w-100 mt-3">
Login
</button>

</form>

</div>

{% endblock %}
