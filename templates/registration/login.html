{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="post">

{% csrf_token %}

<label>Username</label>
<input type="text" name="username">

<label>Password</label>
<input type="password" name="password">

<button type="submit">Login</button>

</form>

{% if form.errors %}
<p style="color:red;">Invalid username or password</p>
{% endif %}

{% endblock %}
