{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<p>Total Tasks: {{ total_tasks }}</p>
<p>Completed Tasks: {{ completed_tasks }}</p>

<div class="progress mb-3">
<div class="progress-bar bg-success"
style="width:{{progress}}%">
{{progress}}%
</div>
</div>

<a href="/add/" class="btn btn-primary mb-3">
Add Task
</a>

{% for task in tasks %}

<div class="task-card">

<h5>{{task.title}}</h5>

<p>{{task.description}}</p>

<div class="task-buttons">

<a href="/edit/{{task.id}}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/toggle/{{task.id}}" class="btn btn-success btn-sm">
Complete
</a>

<a href="/delete/{{task.id}}" class="btn btn-danger btn-sm">
Delete
</a>

</div>

</div>

{% endfor %}

{% endblock %}
