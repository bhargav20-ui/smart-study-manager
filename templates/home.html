{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<a href="/add/">Add Task</a>

<h3>Progress: {{ progress }}%</h3>

<ul>

{% for task in tasks %}

<li>

<b>{{ task.title }}</b>

{% if task.completed %}
✔
{% endif %}

<br>

{{ task.description }}

<br>

<a href="/toggle/{{ task.id }}/">Toggle</a>
<a href="/edit/{{ task.id }}/">Edit</a>
<a href="/delete/{{ task.id }}/">Delete</a>

</li>

{% endfor %}

</ul>

{% endblock %}
