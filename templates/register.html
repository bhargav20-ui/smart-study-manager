{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">

<div class="auth-card">

<h2>Create your account</h2>

<form method="post">

{% csrf_token %}

{{ form.username }}
{{ form.email }}
{{ form.password1 }}
{{ form.password2 }}

<button class="auth-btn">Create Account</button>

</form>

<p class="auth-footer">
Already have an account?
<a href="/accounts/login/">Login</a>
</p>

</div>
</div>

{% endblock %}
