{% extends "base.html" %}

{% block content %}

<div class="auth-box">

<h2>Create Account</h2>

<form method="post">

{% csrf_token %}

{{ form.username }}
{{ form.email }}
{{ form.password1 }}
{{ form.password2 }}

<button class="btn btn-primary w-100 mt-3">
Create Account
</button>

</form>

<p class="mt-3 text-center">
Already have an account?
<a href="/accounts/login/">Login</a>
</p>

</div>

{% endblock %}
