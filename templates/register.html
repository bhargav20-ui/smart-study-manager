{% extends "base.html" %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; min-height:85vh;">

<div style="
width:420px;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.1);
">

<h2 style="text-align:center; margin-bottom:30px;">
Create your account
</h2>

<form method="post">

{% csrf_token %}

<div style="margin-bottom:15px;">
{{ form.username }}
</div>

<div style="margin-bottom:15px;">
{{ form.email }}
</div>

<div style="margin-bottom:15px;">
{{ form.password1 }}
</div>

<div style="margin-bottom:20px;">
{{ form.password2 }}
</div>

<button style="
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
">
Create Account
</button>

</form>

<div style="text-align:center; margin-top:20px;">

<span style="color:#666;">
Already have an account?
</span>

<a href="/accounts/login/" style="
color:#2563eb;
text-decoration:none;
font-weight:500;
">
Login
</a>

</div>

</div>

</div>

{% endblock %}
