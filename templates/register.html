{% extends 'base.html' %}

{% block content %}

<h2>Create Account</h2>

<div class="card p-4">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Register</button>
    </form>
</div>

<p class="mt-3">
    Already have an account? 
<a href="/accounts/login/">Login here</a>
</p>

{% endblock %}
